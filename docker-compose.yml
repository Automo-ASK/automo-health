name: automo-health

# ---------------------------------------------------------------------------
# Day 1 infra: Evolution API (WhatsApp gateway) + its Postgres + Redis.
# NOTE: this Postgres/Redis belong to Evolution only. Koded's booking backend
# will run its own Postgres. Do not point the application at this database.
# ---------------------------------------------------------------------------

services:
  evolution-api:
    image: atendai/evolution-api:${EVOLUTION_VERSION:-v2.1.1}
    container_name: automo-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me-automo-evolution-key}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # ---- The important one ----
      # WhatsApp Web version pin. Avoids the "connection closed / bad session"
      # Baileys bugs that hit when WhatsApp ships a newer web build.
      CONFIG_SESSION_PHONE_VERSION: ${WA_WEB_VERSION:-2.3000.1041645497}

      # ---- Persistence (Evolution v2 requires a provider) ----
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: automo_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      # ---- Cache ----
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: automo_evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"

      # ---- Misc ----
      LOG_LEVEL: ERROR
      LOG_COLOR: "true"
      DEL_INSTANCE: "false"
      QRCODE_LIMIT: "30"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - evolution_instances:/evolution/instances

  postgres:
    image: postgres:16-alpine
    container_name: automo-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: automo-evolution-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  evolution_instances:
  postgres_data:
  redis_data:
